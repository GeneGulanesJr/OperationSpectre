services:
  opspectre:
    image: opspectre-full:latest
    container_name: opspectre-full
    restart: unless-stopped
    hostname: opspectre

    # ===== SECURITY: Least-privilege capabilities =====
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW          # nmap, masscan raw packet crafting
      - NET_BIND_SERVICE # bind to privileged ports (nmap, etc.)

    privileged: false
    security_opt:
      - no-new-privileges:true
      # seccomp=unconfined REMOVED — Docker's default seccomp profile now active

    # DNS REMOVED — Docker's default resolver is used; no forced public DNS

    environment:
      - TOOL_SERVER_TOKEN=${TOOL_SERVER_TOKEN:-changeme}
      - TOOL_SERVER_PORT=${TOOL_SERVER_PORT:-9100}
      - OPSPECTRE_SANDBOX_EXECUTION_TIMEOUT=${OPSPECTRE_SANDBOX_EXECUTION_TIMEOUT:-120}
      - TERM=xterm-256color

    # ===== SECURITY: Minimal volume mounts =====
    volumes:
      - ./output:/workspace/output:rw,noexec,nosuid,nodev
      - msf-data:/var/lib/postgresql
      - msf-data:/var/lib/metasploit

    # ===== SECURITY: Isolated bridge network (can reach internet, NOT host) =====
    networks:
      - opspectre-sandbox-net

    # ===== SECURITY: Resource limits =====
    pids_limit: 512
    mem_limit: 4g
    cpus: 2.0

    # ===== SECURITY: Read-only root filesystem with tmpfs for writable paths =====
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
      - /var/run:noexec,nosuid
      - /var/tmp:noexec,nosuid,size=256m
      - /home/pentester:noexec

    entrypoint: ["docker-entrypoint.sh"]
    command: ["sleep", "infinity"]



volumes:
  msf-data:
    driver: local

networks:
  opspectre-sandbox-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
    # NOTE: internal: true is NOT set — internet access is allowed
    # The bridge isolates from the host network but permits outbound internet
